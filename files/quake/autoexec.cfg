seta com_hunkMegs "512"

// Resolution - uses full native Retina resolution
seta r_mode "-1"
seta r_customwidth "2560"
seta r_customheight "1600"
seta r_fullscreen "1"
seta r_customaspect "1"

// Performance & quality on M1 (runs extremely well)
seta com_maxfps "120"          // or 144 / 240 if you want higher
seta r_displayrefresh "0"      // lets macOS handle refresh rate
seta cl_renderer "opengl2"     // modern renderer (better on Apple Silicon)

// Optional nice tweaks (feel free to change)
seta cg_fov "110"              // wider field of view (good for 16:10)
seta r_gamma "1.2"             // brightness (adjust 1.0 - 1.5)
seta r_intensity "1.5"         // texture brightness
seta cg_drawGun "1"            // 0 = hide gun for cleaner view
seta cg_shadows "1"
seta r_picmip "0"              // sharpest textures (set to 1 or 2 if you want more fps)

// Mouse feel (good starting point for MacBook trackpad + external mouse)
seta sensitivity "8"
seta m_filter "0"
seta cl_mouseAccel "0"

// Start in the main menu cleanly
seta sv_pure "0"               // allows some mods later if you want

// Optional: remove annoying intro
seta com_introPlayed "1"
